<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>演示文稿</title>
  
  <!-- TailwindCSS CDN -->
  <script src="https://lf26-cdn-tos.bytecdntp.com/cdn/expire-1-M/tailwindcss/3.0.23/tailwind.min.js"></script>
  
  <!-- 字体 -->
  <link href="https://fonts.loli.net/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Noto Sans SC', 'Inter', sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }
    
    .slides-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: #0a0a0a;
    }
    
    .slide {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 80px;
      opacity: 0;
      transform: translateX(100%);
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
    }
    
    .slide.active {
      opacity: 1;
      transform: translateX(0);
    }
    
    .slide.prev {
      opacity: 0;
      transform: translateX(-100%);
    }
    
    .light-spot {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      opacity: 0.25;
      pointer-events: none;
    }
    
    .spot-1 {
      width: 600px;
      height: 600px;
      background: #3b82f6;
      top: -150px;
      right: -100px;
      animation: float1 20s ease-in-out infinite;
    }
    
    .spot-2 {
      width: 500px;
      height: 500px;
      background: #8b5cf6;
      bottom: -100px;
      left: -100px;
      animation: float2 25s ease-in-out infinite;
    }
    
    .spot-3 {
      width: 400px;
      height: 400px;
      background: #06b6d4;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: float3 18s ease-in-out infinite;
    }
    
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-40px, 30px); }
      50% { transform: translate(30px, 40px); }
      75% { transform: translate(40px, -20px); }
    }
    
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(35px, -35px); }
      66% { transform: translate(-25px, 25px); }
    }
    
    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.2); }
    }
    
    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      text-align: center;
    }
    
    .progress-bar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      z-index: 100;
    }
    
    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .dot.active {
      background: #fff;
      transform: scale(1.4);
    }
    
    .dot:hover {
      background: rgba(255,255,255,0.6);
    }
    
    .page-num {
      position: fixed;
      top: 30px;
      right: 50px;
      font-size: 18px;
      color: rgba(255,255,255,0.4);
      z-index: 100;
    }
    
    .logo {
      position: fixed;
      top: 30px;
      left: 50px;
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      z-index: 100;
      letter-spacing: 3px;
      font-weight: 300;
    }
    
    .hl { color: #3b82f6; }
    .hl-green { color: #10b981; }
    .hl-purple { color: #8b5cf6; }
    .hl-cyan { color: #06b6d4; }
    
    .gradient {
      background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 50%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 50px;
      width: 100%;
      text-align: left;
    }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      width: 100%;
      text-align: left;
    }
    
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 40px;
      transition: all 0.3s;
    }
    
    .card:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-5px);
    }
    
    .fade-up {
      opacity: 0;
      transform: translateY(40px);
      animation: fadeUp 0.8s ease forwards;
    }
    
    .fade-up:nth-child(1) { animation-delay: 0.1s; }
    .fade-up:nth-child(2) { animation-delay: 0.2s; }
    .fade-up:nth-child(3) { animation-delay: 0.3s; }
    
    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="slides-container">
    
    <!-- 封面页 -->
    <div class="slide active">
      <div class="light-spot spot-1"></div>
      <div class="light-spot spot-2"></div>
      <div class="light-spot spot-3"></div>
      <div class="content">
        <p style="font-size: 20px; color: rgba(255,255,255,0.5); letter-spacing: 4px; margin-bottom: 30px;">LOGO</p>
        <h1 style="font-size: 96px; font-weight: 900; line-height: 1.1; margin-bottom: 40px;">
          主标题 <span class="gradient">关键词</span>
        </h1>
        <p style="font-size: 36px; font-weight: 300; color: rgba(255,255,255,0.5); margin-bottom: 30px;">
          副标题说明
        </p>
        <p style="font-size: 22px; color: rgba(255,255,255,0.4);">补充信息</p>
      </div>
    </div>
    
    <!-- 标题冲击页 -->
    <div class="slide">
      <div class="light-spot spot-2"></div>
      <div class="light-spot spot-3"></div>
      <div class="content">
        <h1 style="font-size: 88px; font-weight: 900; line-height: 1.2; margin-bottom: 50px;">
          冲击性标题 <span class="gradient">关键词</span>
        </h1>
        <p style="font-size: 42px; font-weight: 300; color: rgba(255,255,255,0.5);">
          辅助说明文字
        </p>
      </div>
    </div>
    
    <!-- 三栏列表页 -->
    <div class="slide">
      <div class="light-spot spot-1"></div>
      <div class="content">
        <h2 style="font-size: 64px; font-weight: 700; margin-bottom: 80px;">标题</h2>
        <div class="grid-3">
          <div class="card fade-up">
            <p style="font-size: 40px; font-weight: 700; color: #3b82f6; margin-bottom: 24px;">要点一</p>
            <p style="font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.5); line-height: 1.8;">
              说明文字<br>第二行
            </p>
          </div>
          <div class="card fade-up">
            <p style="font-size: 40px; font-weight: 700; color: #8b5cf6; margin-bottom: 24px;">要点二</p>
            <p style="font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.5); line-height: 1.8;">
              说明文字<br>第二行
            </p>
          </div>
          <div class="card fade-up">
            <p style="font-size: 40px; font-weight: 700; color: #06b6d4; margin-bottom: 24px;">要点三</p>
            <p style="font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.5); line-height: 1.8;">
              说明文字<br>第二行
            </p>
          </div>
        </div>
      </div>
    </div>
    
    <!-- 金句页 -->
    <div class="slide">
      <div class="light-spot spot-1"></div>
      <div class="light-spot spot-3"></div>
      <div class="content">
        <p style="font-size: 100px; color: rgba(255,255,255,0.3); margin-bottom: 20px;">"</p>
        <p style="font-size: 72px; font-weight: 700; line-height: 1.3; margin-bottom: 50px;">
          金句内容 <span class="hl-green">关键词</span>
        </p>
        <p style="font-size: 32px; font-weight: 300; color: rgba(255,255,255,0.5);">
          来源或说明
        </p>
      </div>
    </div>
    
    <!-- 结尾页 -->
    <div class="slide">
      <div class="light-spot spot-1"></div>
      <div class="light-spot spot-2"></div>
      <div class="light-spot spot-3"></div>
      <div class="content">
        <p style="font-size: 20px; font-weight: 300; color: rgba(255,255,255,0.5); letter-spacing: 4px; margin-bottom: 30px;">LOGO</p>
        <h1 style="font-size: 72px; font-weight: 900; line-height: 1.2; margin-bottom: 50px;">
          总结金句，<span class="gradient">关键词</span>
        </h1>
        <p style="font-size: 38px; font-weight: 300; color: rgba(255,255,255,0.5); margin-bottom: 60px;">
          行动号召
        </p>
        <div style="display: flex; gap: 100px; justify-content: center;">
          <div style="text-align: center;">
            <p style="font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.4); margin-bottom: 12px;">说明一</p>
            <p style="font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.5);">详细内容</p>
          </div>
          <div style="text-align: center;">
            <p style="font-size: 18px; font-weight: 300; color: rgba(255,255,255,0.4); margin-bottom: 12px;">说明二</p>
            <p style="font-size: 24px; font-weight: 300; color: rgba(255,255,255,0.5);">详细内容</p>
          </div>
        </div>
      </div>
    </div>
    
  </div>
  
  <div class="logo">LOGO</div>
  <div class="progress-bar" id="progressBar"></div>
  <div class="page-num" id="pageNum">1 / 5</div>
  
  <script>
    const slides = document.querySelectorAll('.slide');
    const progressBar = document.getElementById('progressBar');
    const pageNum = document.getElementById('pageNum');
    let current = 0;
    
    slides.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      dot.onclick = () => goTo(i);
      progressBar.appendChild(dot);
    });
    
    function update() {
      slides.forEach((s, i) => {
        s.classList.remove('active', 'prev');
        if (i === current) s.classList.add('active');
        else if (i < current) s.classList.add('prev');
      });
      document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
      pageNum.textContent = `${current + 1} / ${slides.length}`;
    }
    
    function next() { if (current < slides.length - 1) { current++; update(); } }
    function prev() { if (current > 0) { current--; update(); } }
    function goTo(i) { current = i; update(); }
    
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') next();
      else if (e.key === 'ArrowLeft') prev();
    });
    
    let startX = 0;
    document.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
    document.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) diff > 0 ? next() : prev();
    });
  </script>
</body>
</html>
